<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module" src="js/main.js" defer></script>
    <script type="module" src="js/layout-loader.mjs" defer></script>
</head>

<body>
    <div id="header"></div>

    <main class="container py-5">

        <h1 class="section-title">Currency Converter</h1>

        <div class="converter-box">
            <input type="number" id="amount" placeholder="Amount" class="form-control mb-3">

            <div class="d-flex gap-3 mb-3">
                <select id="fromCurrency" class="form-select"></select>
                <select id="toCurrency"   class="form-select"></select>
            </div>

            <button id="convertBtn" class="btn btn-primary w-100">Convert</button>

            <h2 id="result" class="mt-4 text-center"></h2>
        </div>

    </main>

    <div id="footer"></div>
</body>

</html>
